name: ijq-m0x41
title: ijq (m0x41 package)
contact: https://github.com/miah0x41
source-code: https://github.com/miah0x41/ijq-snap
license: GPL-3.0
base: core24
version: "v1.3.0"
summary: Interactive jq tool - personal package of gpanders/ijq
description: |
  ijq allows the interactive exploration of JSON utilising jq in the 
  background.  Licensed under GNU General Public License v3 (GPLv3).

  Set manual alias using - sudo snap alias ijq-m0x41.ijq ijq
grade: stable
confinement: strict
apps:
  ijq:
    command: usr/bin/ijq
parts:
  build-scdoc:
    plugin: make
    source: https://git.sr.ht/~sircmpwn/scdoc/archive/1.11.4.tar.gz
    build-packages: [gcc]
  build-ijq:
    after: [build-scdoc]
    plugin: make
    source: https://codeberg.org/gpanders/ijq/archive/v1.3.0.tar.gz
    make-parameters:
      - PREFIX=/usr
    build-snaps: [go/latest/stable]
    build-packages: [gcc]
    build-environment:
      - PATH: $CRAFT_STAGE/usr/local/bin:$PATH
  ijq:
    plugin: nil
    stage-packages: [jq]
