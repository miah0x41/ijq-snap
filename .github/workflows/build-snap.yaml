name: Build Snap

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: snapcore/action-build@v1
        id: build

      - uses: actions/upload-artifact@v7
        with:
          name: snap
          path: ${{ steps.build.outputs.snap }}
